<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReservaFácil</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #a78bfa; --purple-light: #ede9fe; --purple-dark: #7c3aed;
      --pink: #f472b6;   --pink-light: #fce7f3;
      --blue: #60a5fa;   --blue-light: #dbeafe;
      --grad: linear-gradient(135deg, #f5f0ff 0%, #fff0f8 50%, #f0f4ff 100%);
      --text: #1e1b4b; --muted: #6b7280; --border: #e5e7eb;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--grad); min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; background: rgba(255,255,255,.85); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.1rem; color: var(--text); cursor: pointer; }
    .brand-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--purple), var(--pink)); border-radius: 10px; display: grid; place-items: center; font-size: 16px; }
    .nav-links { display: flex; gap: 8px; }
    .nav-btn { padding: 8px 16px; border-radius: 10px; font-size: .875rem; font-weight: 500; color: var(--text); background: none; border: 1px solid var(--border); cursor: pointer; transition: all .2s; font-family: inherit; }
    .nav-btn:hover, .nav-btn.active { background: var(--purple-light); border-color: var(--purple); color: var(--purple-dark); }
    .nav-btn.cta { background: linear-gradient(135deg, var(--purple), var(--purple-dark)); color: white; border-color: transparent; }
    .section { display: none; flex: 1; animation: fadeUp .35s ease; }
    .section.active { display: flex; flex-direction: column; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .auth-wrap { flex:1; display:grid; place-items:center; padding:48px 16px; }
    .auth-card { background:white; border-radius:24px; padding:48px 44px; box-shadow:0 8px 40px rgba(124,58,237,.08); width:100%; max-width:440px; }
    .auth-icon { width:64px; height:64px; border-radius:18px; display:grid; place-items:center; font-size:28px; margin:0 auto 20px; }
    .auth-icon.purple { background: linear-gradient(135deg, var(--purple-light), #d8b4fe); }
    .auth-icon.blue   { background: linear-gradient(135deg, var(--blue-light), #93c5fd); }
    .auth-card h1 { text-align:center; font-size:1.75rem; font-weight:700; margin-bottom:6px; color:var(--text); }
    .auth-subtitle { text-align:center; color:var(--muted); font-size:.9rem; margin-bottom:32px; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; font-size:.85rem; font-weight:500; margin-bottom:6px; color:var(--text); }
    .form-group input { width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:12px; font-size:.95rem; font-family:inherit; outline:none; transition:border-color .2s, box-shadow .2s; }
    .form-group input:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(167,139,250,.2); }
    .form-group input.blue-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(96,165,250,.2); }
    .btn-submit { width:100%; padding:14px; border:none; border-radius:12px; cursor:pointer; font-family:inherit; font-size:1rem; font-weight:600; color:white; margin-bottom:20px; transition:all .2s; }
    .btn-submit.purple { background: linear-gradient(135deg, var(--purple), #c084fc); }
    .btn-submit.blue   { background: linear-gradient(135deg, var(--blue), #818cf8); }
    .btn-submit:hover  { opacity:.9; transform:translateY(-1px); }
    .auth-foot { text-align:center; font-size:.875rem; color:var(--muted); }
    .auth-foot span { color:var(--purple); font-weight:500; cursor:pointer; }
    .auth-foot span:hover { text-decoration:underline; }
    .dash-main { flex:1; padding:48px 32px; max-width:1100px; width:100%; margin:0 auto; }
    .hero { text-align:center; margin-bottom:40px; }
    .hero h1 { font-size:2.4rem; font-weight:700; margin-bottom:8px; color:var(--text); }
    .hero p  { color:var(--muted); margin-bottom:28px; }
    .hero-btns { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
    .dash-btn { padding:13px 26px; border:none; border-radius:14px; cursor:pointer; font-family:inherit; font-size:.95rem; font-weight:600; color:white; display:inline-flex; align-items:center; gap:8px; transition:all .2s; }
    .dash-btn.purple { background: linear-gradient(135deg, var(--purple), var(--purple-dark)); }
    .dash-btn.pink   { background: linear-gradient(135deg, var(--pink), #ec4899); }
    .dash-btn:hover  { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.15); }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:28px; }
    .stat-card { background:white; border-radius:20px; padding:28px; box-shadow:0 2px 16px rgba(0,0,0,.05); display:flex; align-items:flex-start; justify-content:space-between; }
    .stat-label { font-weight:600; font-size:.95rem; color:var(--text); }
    .stat-num   { font-size:2.5rem; font-weight:700; margin:8px 0 4px; }
    .stat-num.purple { color:var(--purple-dark); }
    .stat-num.pink   { color:#ec4899; }
    .stat-sub        { font-size:.8rem; color:var(--muted); }
    .stat-sub.green  { color:#10b981; font-weight:500; }
    .stat-icon { width:48px; height:48px; border-radius:14px; display:grid; place-items:center; font-size:22px; flex-shrink:0; }
    .stat-icon.purple { background:var(--purple-light); }
    .stat-icon.pink   { background:var(--pink-light); }
    .activity { background:white; border-radius:20px; padding:28px; box-shadow:0 2px 16px rgba(0,0,0,.05); }
    .activity h2  { font-size:1.15rem; font-weight:700; margin-bottom:4px; color:var(--text); }
    .activity-sub { font-size:.82rem; color:var(--muted); margin-bottom:20px; }
    .res-item { display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:12px; margin-bottom:10px; background:#fafafa; transition:background .2s; }
    .res-item:hover { background:var(--purple-light); }
    .res-icon { width:38px; height:38px; border-radius:10px; display:grid; place-items:center; font-size:16px; flex-shrink:0; }
    .res-icon.purple { background:var(--purple-light); }
    .res-icon.pink   { background:var(--pink-light); }
    .res-icon.blue   { background:var(--blue-light); }
    .res-info { flex:1; }
    .res-info strong { display:block; font-size:.9rem; font-weight:600; color:var(--text); }
    .res-info span   { font-size:.8rem; color:var(--muted); }
    .res-time { text-align:right; }
    .res-time strong { display:block; font-size:.9rem; font-weight:600; color:var(--text); }
    .res-time span   { font-size:.75rem; color:var(--muted); }
    .about-main { flex:1; padding:60px 32px; max-width:900px; width:100%; margin:0 auto; }
    .about-hero { text-align:center; margin-bottom:48px; }
    .about-icon { width:72px; height:72px; border-radius:20px; background:linear-gradient(135deg,#fbbf24,#f59e0b); display:grid; place-items:center; font-size:30px; margin:0 auto 20px; }
    .about-hero h1 { font-size:2.8rem; font-weight:700; margin-bottom:12px; color:var(--text); }
    .about-hero p  { color:var(--muted); max-width:560px; margin:0 auto; line-height:1.6; }
    .info-card { background:white; border-radius:20px; padding:32px; margin-bottom:20px; box-shadow:0 2px 16px rgba(0,0,0,.05); }
    .info-card h2 { font-size:1.1rem; font-weight:700; margin-bottom:12px; color:var(--text); }
    .info-card p  { color:var(--muted); line-height:1.7; }
    .features-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
    .feat { background:white; border-radius:20px; padding:28px 20px; text-align:center; box-shadow:0 2px 16px rgba(0,0,0,.05); }
    .feat-icon { width:56px; height:56px; border-radius:16px; display:grid; place-items:center; font-size:24px; margin:0 auto 14px; }
    .feat-icon.purple { background:var(--purple-light); }
    .feat-icon.pink   { background:var(--pink-light); }
    .feat-icon.blue   { background:var(--blue-light); }
    .feat h3 { font-size:.95rem; font-weight:700; margin-bottom:8px; color:var(--text); }
    .feat p  { font-size:.82rem; color:var(--muted); line-height:1.6; }
    .dev-card { background:linear-gradient(135deg,#fffbeb,#fef3c7); border-radius:20px; padding:24px 28px; display:flex; align-items:flex-start; gap:14px; box-shadow:0 2px 16px rgba(0,0,0,.05); }
    .dev-card h3 { font-weight:700; margin-bottom:4px; color:var(--text); }
    .dev-card p  { font-size:.87rem; color:#92400e; line-height:1.6; }
    footer { text-align:center; padding:20px; font-size:.8rem; color:var(--muted); border-top:1px solid var(--border); background:rgba(255,255,255,.5); }
    @media(max-width:680px) {
      .stats-grid { grid-template-columns:1fr; }
      .features-grid { grid-template-columns:1fr; }
      .auth-card { padding:32px 20px; }
      .dash-main, .about-main { padding:28px 16px; }
      nav { padding:12px 16px; }
    }
  </style>
</head>
<body>

<nav>
  <div id="brand" class="brand">
    <div class="brand-icon">🏛️</div>
    ReservaFácil
  </div>
  <div id="navLinks" class="nav-links"></div>
</nav>

<div id="sec-login"     class="section active"></div>
<div id="sec-register"  class="section"></div>
<div id="sec-dashboard" class="section"></div>
<div id="sec-about"     class="section"></div>

<footer id="footerBar"></footer>

<script src="main.js"></script>
</body>
</html>
